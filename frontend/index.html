<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DS余额" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>DeepSeek 余额监控</title>
  <style>
    :root {
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC',
        'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #000;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      color: #fff;
    }

    /* ================================================================
       Animated orbs
       ================================================================ */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
    }

    .orb--1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #6366f1 0%, #a855f7 60%, transparent 100%);
      top: -60px; left: -50px;
      animation: orb1 14s ease-in-out infinite;
    }
    .orb--2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, #06b6d4 0%, #3b82f6 60%, transparent 100%);
      bottom: -50px; right: -60px;
      animation: orb2 16s ease-in-out infinite;
    }
    .orb--3 {
      width: 220px; height: 220px;
      background: radial-gradient(circle, #f472b6 0%, #ec4899 50%, transparent 100%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: orb3 18s ease-in-out infinite;
    }

    @keyframes orb1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(40px, -30px) scale(1.15); }
    }
    @keyframes orb2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-30px, 30px) scale(1.1); }
    }
    @keyframes orb3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-40%, -60%) scale(1.12); }
    }

    /* ================================================================
       Single Liquid Glass Card — everything inside
       ================================================================ */
    .glass-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      padding: 28px 26px 22px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* --- Top bar: title + status --- */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.2px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.4s ease;
    }

    .status-dot.online {
      background: #34c759;
      box-shadow: 0 0 6px rgba(52,199,89,0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #ff453a;
      box-shadow: 0 0 6px rgba(255,69,58,0.5);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* --- Currency selector (if multiple currencies) --- */
    .currency-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .currency-tab {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      padding: 5px 14px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .currency-tab.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
    }

    /* --- Big balance number --- */
    .balance-section {
      text-align: center;
      margin-bottom: 6px;
    }

    .balance-currency-symbol {
      font-size: 20px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      margin-bottom: -8px;
    }

    .balance-number {
      font-size: 64px;
      font-weight: 200;
      letter-spacing: -2px;
      color: #fff;
      line-height: 1;
      font-feature-settings: "tnum";
    }

    .balance-number .cents {
      font-size: 32px;
      font-weight: 200;
      opacity: 0.4;
    }

    /* --- Divider --- */
    .divider {
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 20%,
        rgba(255,255,255,0.12) 50%,
        rgba(255,255,255,0.08) 80%,
        transparent 100%
      );
      margin: 18px 0 16px;
    }

    /* --- Detail sub-balances --- */
    .detail-row {
      display: flex;
      justify-content: space-around;
      text-align: center;
      margin-bottom: 20px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .detail-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 17px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      font-feature-settings: "tnum";
    }

    /* --- Footer: update time + refresh --- */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .update-time {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    .btn-refresh {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-refresh:active {
      background: rgba(255,255,255,0.18);
      transform: scale(0.9);
    }

    .btn-refresh.loading svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Error banner inside card --- */
    .error-line {
      text-align: center;
      font-size: 12px;
      color: #ff6961;
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,69,58,0.08);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <!-- Background orbs -->
  <div class="bg-orbs">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <!-- ================================================================
       Single Liquid Glass Card
       ================================================================ -->
  <div class="glass-card" id="glassCard">
    <!-- Top: title + status -->
    <div class="card-top">
      <div class="card-title">DeepSeek 余额</div>
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">加载中…</span>
      </div>
    </div>

    <!-- Big number -->
    <div class="balance-section">
      <div class="balance-currency-symbol" id="currencySymbol">¥</div>
      <div class="balance-number" id="balanceNumber">—</div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Detail sub-balances -->
    <div class="detail-row">
      <div class="detail-item">
        <span class="detail-label">充值余额</span>
        <span class="detail-value" id="toppedUp">—</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">赠送余额</span>
        <span class="detail-value" id="granted">—</span>
      </div>
    </div>

    <!-- Currency tabs (hidden if only 1 currency) -->
    <div class="currency-tabs" id="currencyTabs" style="display:none;"></div>

    <!-- Error -->
    <div class="error-line" id="errorLine" style="display:none;"></div>

    <!-- Footer: time + refresh -->
    <div class="card-footer">
      <span class="update-time" id="updateTime">—</span>
      <button class="btn-refresh" id="btnRefresh" onclick="refreshBalance()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ===================================================================
    // Config
    // ===================================================================
    const params = new URLSearchParams(location.search);
    const API_BASE = params.get("api") || location.origin;
    const REFRESH_INTERVAL = 30;

    // ===================================================================
    // DOM refs
    // ===================================================================
    const $ = (id) => document.getElementById(id);
    const $statusDot    = $("statusDot");
    const $statusText   = $("statusText");
    const $currencySymbol = $("currencySymbol");
    const $balanceNumber = $("balanceNumber");
    const $toppedUp     = $("toppedUp");
    const $granted      = $("granted");
    const $updateTime   = $("updateTime");
    const $errorLine    = $("errorLine");
    const $btnRefresh   = $("btnRefresh");
    const $currencyTabs = $("currencyTabs");

    let allCurrencies = [];
    let activeIdx = 0;
    let countdown = REFRESH_INTERVAL;
    let countdownTimer = null;

    // ===================================================================
    // Format
    // ===================================================================
    function fmtFull(val) {
      const num = Number(val);
      if (isNaN(num)) return "—";
      const [whole, frac = ""] = num.toFixed(2).split(".");
      return `${Number(whole).toLocaleString()}.<span class="cents">${frac}</span>`;
    }

    function fmtPlain(val) {
      const num = Number(val);
      if (isNaN(num)) return "—";
      return num.toFixed(2);
    }

    function fmtTime(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      } catch { return "—"; }
    }

    const CURRENCY_META = {
      CNY: { symbol: "¥" },
      USD: { symbol: "$" },
      EUR: { symbol: "€" },
    };

    // ===================================================================
    // Render
    // ===================================================================
    function render(all) {
      allCurrencies = all || [];
      if (allCurrencies.length === 0) {
        $balanceNumber.innerHTML = "—";
        $toppedUp.textContent = "—";
        $granted.textContent = "—";
        $currencyTabs.style.display = "none";
        return;
      }

      // Show tabs only if multiple currencies
      if (allCurrencies.length > 1) {
        $currencyTabs.style.display = "flex";
        $currencyTabs.innerHTML = allCurrencies.map((c, i) =>
          `<span class="currency-tab${i === activeIdx ? " active" : ""}" onclick="switchCurrency(${i})">${c.currency}</span>`
        ).join("");
      } else {
        $currencyTabs.style.display = "none";
      }

      renderActive();
    }

    function renderActive() {
      if (!allCurrencies.length || activeIdx >= allCurrencies.length) return;
      const c = allCurrencies[activeIdx];
      const meta = CURRENCY_META[c.currency] || { symbol: c.currency };
      $currencySymbol.textContent = meta.symbol;
      $balanceNumber.innerHTML = fmtFull(c.total_balance);
      $toppedUp.textContent = fmtPlain(c.topped_up_balance);
      $granted.textContent = fmtPlain(c.granted_balance);
    }

    function switchCurrency(i) {
      activeIdx = i;
      // Refresh tabs
      if (allCurrencies.length > 1) {
        const tabs = $currencyTabs.querySelectorAll(".currency-tab");
        tabs.forEach((t, j) => t.classList.toggle("active", j === i));
      }
      renderActive();
    }

    function setStatus(ok) {
      $statusDot.className = "status-dot " + (ok ? "online" : "offline");
      $statusText.textContent = ok ? "在线" : "离线";
    }

    function showError(msg) {
      $errorLine.style.display = "block";
      $errorLine.textContent = msg;
    }

    function hideError() {
      $errorLine.style.display = "none";
    }

    // ===================================================================
    // API
    // ===================================================================
    async function refreshBalance() {
      $btnRefresh.classList.add("loading");
      hideError();

      try {
        const resp = await fetch(`${API_BASE}/api/balance`, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const data = await resp.json();

        if (data.error) {
          setStatus(false);
          showError(data.error);
          if (data.currencies) render(data.currencies);
        } else {
          setStatus(true);
          $updateTime.textContent = "更新 " + fmtTime(data.fetched_at);
          render(data.currencies);
          countdown = REFRESH_INTERVAL;
        }
      } catch (err) {
        setStatus(false);
        showError("无法连接: " + err.message);
      } finally {
        $btnRefresh.classList.remove("loading");
      }
    }

    // ===================================================================
    // Countdown
    // ===================================================================
    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          countdown = REFRESH_INTERVAL;
          refreshBalance();
        }
      }, 1000);
    }

    // ===================================================================
    // Init
    // ===================================================================
    function init() {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }
      refreshBalance();
      startCountdown();
    }

    init();
  </script>
</body>
</html>
